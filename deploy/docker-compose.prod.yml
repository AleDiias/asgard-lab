# Produção — VPS Ubuntu + Docker.
# O ficheiro deploy/.env é lido diretamente pelos contentores (env_file: .env),
# para DATABASE_URL e segredos não dependerem só da interpolação no host.
#
# Executar: ./deploy/scripts/prod-up.sh
#
# Contentores: asgardlab-postgres, asgardlab-api-auth, asgardlab-api-core, asgardlab-frontend

name: asgardlab

services:
  postgres:
    image: postgres:16-alpine
    container_name: asgardlab-postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - asgardlab_pg_data:/var/lib/postgresql/data
    networks:
      - asgardlab_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  api-auth:
    build:
      context: ..
      dockerfile: deploy/docker/api-auth.Dockerfile
    container_name: asgardlab-api-auth
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${API_AUTH_PORT:-3001}
    ports:
      - "${HOST_API_AUTH_PORT:-3001}:${API_AUTH_PORT:-3001}"
    networks:
      - asgardlab_net

  api-core:
    build:
      context: ..
      dockerfile: deploy/docker/api-core.Dockerfile
    container_name: asgardlab-api-core
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${API_CORE_PORT:-3002}
    ports:
      - "${HOST_API_CORE_PORT:-3002}:${API_CORE_PORT:-3002}"
    networks:
      - asgardlab_net

  frontend:
    build:
      context: ..
      dockerfile: deploy/docker/frontend.Dockerfile
      args:
        VITE_API_URL: ${PUBLIC_API_AUTH_URL:?Defina PUBLIC_API_AUTH_URL no deploy/.env}
        VITE_API_CORE_URL: ${PUBLIC_API_CORE_URL:?Defina PUBLIC_API_CORE_URL no deploy/.env}
    container_name: asgardlab-frontend
    restart: unless-stopped
    depends_on:
      - api-auth
      - api-core
    ports:
      - "${HOST_FRONTEND_PORT:-80}:80"
    networks:
      - asgardlab_net

networks:
  asgardlab_net:
    driver: bridge

volumes:
  asgardlab_pg_data:
