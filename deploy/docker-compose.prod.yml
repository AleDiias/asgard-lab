# Produção — VPS Ubuntu + Docker.
# Executar a partir da raiz do repositório:
#   ./deploy/scripts/prod-up.sh
#
# Contentores: asgardlab-postgres, asgardlab-api-auth, asgardlab-api-core, asgardlab-frontend

name: asgardlab

services:
  postgres:
    image: postgres:16-alpine
    container_name: asgardlab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-asgard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no deploy/.env}
      POSTGRES_DB: ${POSTGRES_DB:-asgard_master}
    volumes:
      - asgardlab_pg_data:/var/lib/postgresql/data
    networks:
      - asgardlab_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  api-auth:
    build:
      context: ..
      dockerfile: deploy/docker/api-auth.Dockerfile
    container_name: asgardlab-api-auth
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${API_AUTH_PORT:-3001}
      JWT_SECRET: ${JWT_SECRET:?Defina JWT_SECRET no deploy/.env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      DATABASE_URL: ${DATABASE_URL:?Defina DATABASE_URL no deploy/.env com host postgres}
      FRONTEND_URL: ${PUBLIC_FRONTEND_URL:?Defina PUBLIC_FRONTEND_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?Defina CORS_ALLOWED_ORIGINS}
      JSON_LIMIT: ${JSON_LIMIT:-1mb}
      ASGARD_SEED_EMAIL: ${ASGARD_SEED_EMAIL:-administrador@asgardai.com.br}
      ASGARD_SEED_PASSWORD: ${ASGARD_SEED_PASSWORD:-}
      ASGARD_SEED_NAME: ${ASGARD_SEED_NAME:-Administrador}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      EMAIL_LOGO_URL: ${EMAIL_LOGO_URL:-}
    ports:
      - "${HOST_API_AUTH_PORT:-3001}:${API_AUTH_PORT:-3001}"
    networks:
      - asgardlab_net

  api-core:
    build:
      context: ..
      dockerfile: deploy/docker/api-core.Dockerfile
    container_name: asgardlab-api-core
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${API_CORE_PORT:-3002}
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      JSON_LIMIT: ${JSON_LIMIT:-1mb}
    ports:
      - "${HOST_API_CORE_PORT:-3002}:${API_CORE_PORT:-3002}"
    networks:
      - asgardlab_net

  frontend:
    build:
      context: ..
      dockerfile: deploy/docker/frontend.Dockerfile
      args:
        VITE_API_URL: ${PUBLIC_API_AUTH_URL:?Defina PUBLIC_API_AUTH_URL}
        VITE_API_CORE_URL: ${PUBLIC_API_CORE_URL:?Defina PUBLIC_API_CORE_URL}
    container_name: asgardlab-frontend
    restart: unless-stopped
    depends_on:
      - api-auth
      - api-core
    ports:
      - "${HOST_FRONTEND_PORT:-80}:80"
    networks:
      - asgardlab_net

networks:
  asgardlab_net:
    driver: bridge

volumes:
  asgardlab_pg_data:
