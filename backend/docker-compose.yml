version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: asgard_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-asgard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-asgard}
      POSTGRES_DB: ${POSTGRES_DB:-asgard_master}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - asgard_internal
    # Dev local: expõe somente para loopback da máquina host.
    ports:
      - "127.0.0.1:5432:5432"

networks:
  asgard_internal:
    driver: bridge

volumes:
  postgres_data:
